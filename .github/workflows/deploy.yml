name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Write env
        run: |
          printf 'VITE_LEDGER_FN_URL=%s\n' "${{ secrets.VITE_LEDGER_FN_URL }}" >> .env.production.local
          printf 'VITE_CAPTURE_KEY=%s\n' "${{ secrets.VITE_CAPTURE_KEY }}" >> .env.production.local
          echo "VITE vars written: $(grep -c VITE .env.production.local) lines"

      - name: Build
        run: npm run build

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
